<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>A Flower For You 🌸</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
radial-gradient(circle at top,
#1a001f 0%,
#0b0b15 40%,
#030712 100%);

font-family:sans-serif;

color:white;

overflow-x:hidden;

min-height:100vh;

text-align:center;

padding:40px 20px;

opacity:0;

animation:fadeIn 2.0s ease forwards;

}

@keyframes fadeIn{

from{

opacity:0;

}

to{

opacity:1;

}

}

/* Bunga jatuh */

.flower{

position:fixed;

top:-50px;

font-size:24px;

animation:fall 8s linear forwards;

pointer-events:none;

}

@keyframes fall{

from{

transform:
translateY(0)
rotate(0deg);

opacity:1;

}

to{

transform:
translateY(120vh)
rotate(360deg);

opacity:0;

}

}

.burstFlower{

position:fixed;

font-size:24px;

pointer-events:none;

z-index:1000;

transform:translate(-50%,-50%);

opacity:1;

transition:
top 1.2s ease,
left 1.2s ease,
opacity 1.2s ease;

}

@keyframes flowerFade{

from{

opacity:0;

}

to{

opacity:1;

}

}

.title{

font-size:clamp(1.3rem,4vw,2rem);

margin-top:40px;

text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4;

white-space:nowrap;

}
  
.message{

margin-top:20px;

font-size:1.2rem;

opacity:.9;

}

.mainFlower{

font-size:120px;

cursor:pointer;

margin:40px 0;

animation:flowerPulse 2s infinite;

}

@keyframes flowerPulse{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.1);

}

}

.mainFlower:hover{

transform:scale(1.1);

}

.card{

background:rgba(255,255,255,.05);

padding:25px;

border-radius:20px;

margin:25px auto;

max-width:700px;

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 15px rgba(255,105,180,.3),
0 0 30px rgba(255,105,180,.15);

}

.card h2{

white-space:nowrap;

font-size:clamp(1.2rem,4vw,2rem);

}

.button{

display:inline-block;

margin-top:20px;

padding:15px 30px;

border-radius:50px;

border:none;

cursor:pointer;

background:#ff69b4;

color:white;

font-size:1rem;

}

#giftContent{

display:none;

opacity:0;

transition:.8s;

margin-top:20px;

}

.giftGif{

position:fixed;

width:120px;

max-width:40vw;

border-radius:20px;

z-index:9999;

pointer-events:none;

transform:
translate(-50%,-50%);

transition:
top .5s ease,
left .5s ease,
opacity 1s ease;

}

@keyframes giftExplode{

from{

top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(0);

opacity:0;

}

to{

transform:
translate(-50%,-50%)
scale(1);

opacity:1;

}

}

</style></head><body><h1 class="title">
🌸 A FLOWER FOR YOU 🌸
</h1><p class="message">
Congrats Udah Stalk Sampai Sini
</p><div class="mainFlower"
onclick="bloomFlowers()">
🌷
</div><div class="card"><h2>
🏆 ACHIEVEMENT UNLOCKED
</h2></div><button class="button"
onclick="showGift()">
🎁 Buka Hadiah 🎁
</button>

<div id="giftContent"><h2>
🎉 SURPRISE 🎉
</h2><p>
Masukkan GIF lucumu di sini 🤣💖
</p><!-- Nanti tempel GIF di sini --></div><p style="margin-top:40px;">
MAACI UDAH STALKING
</p><p style="margin-top:40px;">
SAMPAI JUMPA DI CHAT🤭
</p>
  
<img
src="giphy.gif"
style="
width:180px;
margin-top:20px;
border-radius:20px;
">

<script>

/* bunga jatuh terus */

setInterval(()=>{

let flower =
document.createElement("div");

flower.classList.add("flower");

flower.innerHTML = "🌸";

flower.style.left =
Math.random()*100+"vw";

flower.style.fontSize =
(Math.random()*20+20)+"px";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove();

},8000);

},500);

/* bunga utama ditekan */

function bloomFlowers(){

for(let i=0;i<80;i++){

let flower =
document.createElement("div");

flower.classList.add("burstFlower");

flower.innerHTML = "🌸";

flower.style.left = "50vw";
flower.style.top = "50vh";

document.body.appendChild(flower);

const randomTop =
Math.random()*90 + 5;

const randomLeft =
Math.random()*90 + 5;

setTimeout(()=>{

flower.style.top =
randomTop + "vh";

flower.style.left =
randomLeft + "vw";

flower.style.opacity = "0";

},0);

setTimeout(()=>{

flower.remove();

},1500);

}

}

document.addEventListener("DOMContentLoaded",()=>{

setTimeout(()=>{

bloomFlowers();

},800);

});

/* hadiah */

function showGift(){

const gifts = [

"200w (1).webp",
"200w (2).webp",
"200w (3).webp",
"200w (4).webp",
"200w (5).webp",
"200w (6).webp",
"200w (7).webp",
"200w (8).webp",
"200w (9).webp",
"200w (10).webp",
"200w (11).webp",
"200w (12).webp",
"200w (13).webp",
"200w (14).webp",
"200w (15).webp",
"200w (16).webp",
"200w (17).webp",
"200w (18).webp",
"200w (19).webp",
"200w (20).webp",
"200w (21).webp"

];

const activeGifts = [];

let delay = 0;

gifts.forEach((gif)=>{

setTimeout(()=>{

const img =
document.createElement("img");

img.src = gif;

img.classList.add("giftGif");

img.style.top = "50vh";

img.style.left = "50vw";

img.style.animation =
"giftExplode .5s ease";

document.body.appendChild(img);

const cols = 3;

const row =
Math.floor(activeGifts.length / cols);

const col =
activeGifts.length % cols;

const randomTop =
8 + (row * 14);

const leftPositions = [
20, 50, 80
];

const randomLeft =
leftPositions[col];

setTimeout(()=>{

img.style.top =
randomTop + "vh";

img.style.left =
randomLeft + "vw";

},50);

activeGifts.push(img);

},delay);

delay += 50;

});

setTimeout(()=>{

activeGifts.forEach(img=>{

img.style.opacity = "0";

});

setTimeout(()=>{

activeGifts.forEach(img=>{

img.remove();

});

},1000);

},4000);

}
  
</script></body>
  </html>
