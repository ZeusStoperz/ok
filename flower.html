<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>A Flower For You 🌸</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
radial-gradient(circle at top,
#1a001f 0%,
#0b0b15 40%,
#030712 100%);

font-family:sans-serif;

color:white;

overflow-x:hidden;

min-height:100vh;

text-align:center;

padding:40px 20px;

}

/* Bunga jatuh */

.flower{

position:fixed;

top:-50px;

font-size:24px;

animation:fall 8s linear forwards;

pointer-events:none;

}

@keyframes fall{

from{

transform:
translateY(0)
rotate(0deg);

opacity:1;

}

to{

transform:
translateY(120vh)
rotate(360deg);

opacity:0;

}

}

.title{

font-size:clamp(1.3rem,4vw,2rem);

margin-top:40px;

text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4;

white-space:nowrap;

}
  
.message{

margin-top:20px;

font-size:1.2rem;

opacity:.9;

}

.mainFlower{

font-size:120px;

cursor:pointer;

margin:40px 0;

animation:flowerPulse 2s infinite;

}

@keyframes flowerPulse{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.1);

}

}

.mainFlower:hover{

transform:scale(1.1);

}

.card{

background:rgba(255,255,255,.05);

padding:25px;

border-radius:20px;

margin:25px auto;

max-width:700px;

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 15px rgba(255,105,180,.3),
0 0 30px rgba(255,105,180,.15);

}

.button{

display:inline-block;

margin-top:20px;

padding:15px 30px;

border-radius:50px;

border:none;

cursor:pointer;

background:#ff69b4;

color:white;

font-size:1rem;

}

#giftContent{

display:none;

opacity:0;

transition:.8s;

margin-top:20px;

}

.homeBtn{

display:inline-block;

margin-top:40px;

padding:15px 30px;

border-radius:50px;

background:#ff69b4;

color:white;

text-decoration:none;

}

.giftGif{

position:fixed;

width:120px;

max-width:40vw;

border-radius:20px;

z-index:9999;

pointer-events:none;

transform:
translate(-50%,-50%);

transition:
top .5s ease,
left .5s ease;

}

@keyframes giftExplode{

from{

top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(0);

opacity:0;

}

to{

transform:
translate(-50%,-50%)
scale(1);

opacity:1;

}

}

</style></head><body><h1 class="title">
🌸 A FLOWER FOR YOU 🌸
</h1><p class="message">
Makasih udah stalking sampai sini😁
</p><div class="mainFlower"
onclick="bloomFlowers()">
🌷
</div><div class="card"><h2>
🏆 ACHIEVEMENT UNLOCKED
</h2><p>
STALKER LEVEL MAX 😭💖
</p></div><button class="button"
onclick="showGift()">
🎁 Buka Hadiah 🎁
</button>

<div id="giftContent"><h2>
🎉 SURPRISE 🎉
</h2><p>
Masukkan GIF lucumu di sini 🤣💖
</p><!-- Nanti tempel GIF di sini --></div><p style="margin-top:40px;">
💖 Terima kasih sudah berkunjung 💖
</p><a href="home.html"
class="homeBtn">
🏠 Kembali ke Home
</a>

<script>

/* bunga jatuh terus */

setInterval(()=>{

let flower =
document.createElement("div");

flower.classList.add("flower");

flower.innerHTML = "🌸";

flower.style.left =
Math.random()*100+"vw";

flower.style.fontSize =
(Math.random()*20+20)+"px";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove();

},8000);

},500);

/* bunga utama ditekan */

function bloomFlowers(){

for(let i=0;i<20;i++){

let flower =
document.createElement("div");

flower.classList.add("flower");

flower.innerHTML = "🌸";

flower.style.left =
(40 + Math.random()*20)+"vw";

flower.style.top =
"40vh";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove();

},5000);

}

}

/* hadiah */

function showGift(){

const gifts = [

"200w (1).webp",
"200w (2).webp",
"200w (3).webp",
"200w (4).webp",
"200w (5).webp",
"200w (6).webp",
"200w (7).webp",
"200w (8).webp",
"200w (9).webp",
"200w (10).webp",
"200w (11).webp",
"200w (12).webp",
"200w (13).webp",
"200w (14).webp",
"200w (15).webp",
"200w (16).webp",
"200w (17).webp",
"200w (18).webp",
"200w (19).webp",
"200w (20).webp",
"200w (21).webp"

];

const activeGifts = [];

let delay = 0;

gifts.forEach((gif)=>{

setTimeout(()=>{

const img =
document.createElement("img");

img.src = gif;

img.classList.add("giftGif");

img.style.top = "50vh";

img.style.left = "50vw";

img.style.animation =
"giftExplode .5s ease forwards";

document.body.appendChild(img);

const cols = 3;

const row =
Math.floor(activeGifts.length / cols);

const col =
activeGifts.length % cols;

const randomTop =
12 + (row * 14);

const leftPositions = [
20, 50, 80
];

const randomLeft =
leftPositions[col];

setTimeout(()=>{

img.style.top =
randomTop + "vh";

img.style.left =
randomLeft + "vw";

},50);

activeGifts.push(img);

},delay);

delay += 50;

});

setTimeout(()=>{

activeGifts.forEach(img=>{

img.remove();

});

},3000);

}
  
</script></body>
  </html>
