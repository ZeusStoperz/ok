<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAKANDA ZONE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#030712;
font-family:'Orbitron',sans-serif;
position:fixed;
width:100vw;
height:100vh;
overflow:hidden;
}

/* BINTANG */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* MATAHARI */

.sun{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);

width:110px;
height:110px;

border-radius:50%;

background:radial-gradient(
circle,
#fff7a8 0%,
#ffd60a 20%,
#ffb703 45%,
#fb8500 70%,
#ff6b00 100%
);

box-shadow:
0 0 60px #ffd60a,
0 0 120px #ffb703,
0 0 200px #fb8500;

animation:sunPulse 5s ease-in-out infinite;
}
/* ORBIT */

.orbit{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid rgba(255,255,255,.08);
border-radius:50%;
}

.orbit1{
width:220px;
height:220px;
animation:spin 8s linear infinite;
}

.orbit2{
width:280px;
height:280px;
animation:spin 12s linear infinite;
}

.orbit3{
width:360px;
height:360px;
animation:spin 16s linear infinite;
}

.orbit4{
width:450px;
height:450px;
animation:spin 20s linear infinite;
}

.orbit5{
width:550px;
height:550px;
animation:spin 28s linear infinite;
}

.orbit6{
width:650px;
height:650px;
animation:spin 36s linear infinite;
}

.orbit7{
width:720px;
height:720px;
animation:spin 45s linear infinite;
}

.orbit8{
width:780px;
height:780px;
animation:spin 55s linear infinite;
}

@keyframes spin{
from{
transform:translate(-50%,-50%) rotate(0deg);
}
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

/* PLANET */

.planet{
position:absolute;
left:50%;
top:-15px;
transform:translateX(-50%);
border-radius:50%;
}

.mercury{
width:12px;
height:12px;
background:#9a9a9a;
}

.venus{
width:18px;
height:18px;
background:#d9a066;
}

.earth{
width:24px;
height:24px;
background:linear-gradient(#1e90ff,#2ecc71);
}

.mars{
width:18px;
height:18px;
background:#c1440e;
}

.jupiter{
width:55px;
height:55px;
background:
repeating-linear-gradient(
0deg,
#d9b38c,
#d9b38c 8px,
#c9975b 8px,
#c9975b 16px
);
}

.saturn{
width:40px;
height:40px;
background:#e6c98b;
position:absolute;
left:50%;
top:-20px;
transform:translateX(-50%);
border-radius:50%;
}

.saturn::before{
content:'';
position:absolute;
width:70px;
height:14px;
border:2px solid #f0dca5;
border-radius:50%;
left:-15px;
top:11px;
}

.uranus{
width:30px;
height:30px;
background:#8be9fd;
}

.neptune{
width:28px;
height:28px;
background:#4169e1;
}

/* HERO */

.hero{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:100;
  }

.hero h1{
font-size:clamp(3rem,8vw,6rem);
color:white;
letter-spacing:10px;

position:relative;
left:5px;

text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

.hero p{
margin-top:15px;
color:#ddd;
font-size:1.1rem;
}

.enter-btn{
display:inline-block;
margin-top:35px;
padding:15px 60px;

border:2px solid #00ffff;
border-radius:50px;

text-decoration:none;
color:white;

box-shadow:0 0 20px #00ffff;

transition:.3s;

animation:glitch 4s infinite;
}

.enter-btn:hover{
background:#00ffff;
color:black;
transform:scale(1.08);
}

/* METEOR */

.meteor{
position:absolute;
width:4px;
height:120px;

background:
linear-gradient(white,transparent);

transform:rotate(45deg);

animation:meteorMove 3s linear;
}

@keyframes meteorMove{

from{
transform:
translate(0,0)
rotate(45deg);
}

to{
transform:
translate(700px,700px)
rotate(45deg);
}

}

@keyframes glitch{

0%,90%,100%{
transform:translateX(0);
}

91%{
transform:translateX(-2px);
}

92%{
transform:translateX(2px);
}

93%{
transform:translateX(-2px);
}

94%{
transform:translateX(2px);
}

95%{
transform:translateX(0);
}

}

body.hyperjump{
animation:
shake .15s 6,
hyperJump 1.8s forwards;
}

@keyframes shake{

0%{transform:translate(0);}
25%{transform:translate(3px,-3px);}
50%{transform:translate(-3px,3px);}
75%{transform:translate(3px,3px);}
100%{transform:translate(0);}

  }

@keyframes hyperJump{

0%{
transform:scale(1);
filter:brightness(1);
}

30%{
transform:scale(1.05);
filter:brightness(1.5);
}

60%{
transform:scale(1.3);
filter:brightness(2);
}

100%{
transform:scale(4);
filter:brightness(8);
opacity:0;
}

}

.enter-btn.hyper{
box-shadow:
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan,
0 0 120px cyan;
}

.sun.collapse{
animation:sunCollapse 1.8s forwards;
}

@keyframes sunCollapse{

0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

100%{
transform:translate(-50%,-50%) scale(8);
opacity:0;
}

}
  
</style>
</head>

<body>

<div class="sun"></div>

<div class="orbit orbit1"><div class="planet mercury"></div></div>
<div class="orbit orbit2"><div class="planet venus"></div></div>
<div class="orbit orbit3"><div class="planet earth"></div></div>
<div class="orbit orbit4"><div class="planet mars"></div></div>
<div class="orbit orbit5"><div class="planet jupiter"></div></div>
<div class="orbit orbit6"><div class="saturn"></div></div>
<div class="orbit orbit7"><div class="planet uranus"></div></div>
<div class="orbit orbit8"><div class="planet neptune"></div></div>

<div class="hero">

<h1>KAKANDA ZONE</h1>

<p>✨ Welcome To My Universe ✨</p>

<a href="home.html" class="enter-btn" id="enterBtn">
ENTER
</a>

</div>

<script>

/* Bintang */

for(let i=0;i<300;i++){

let star=document.createElement("div");

star.classList.add("star");

let size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(star);
}

/* Meteor */

function createMeteor(){

const meteor=document.createElement("div");

meteor.classList.add("meteor");

meteor.style.left=Math.random()*100+"vw";
meteor.style.top="-100px";

document.body.appendChild(meteor);

setTimeout(()=>{
meteor.remove();
},3000);

}

function randomMeteor(){

    createMeteor();

    const randomTime =
    Math.random() * 5000 + 4000;

    setTimeout(randomMeteor, randomTime);

}

randomMeteor();

</script>

<script>

const btn=document.getElementById("enterBtn");

btn.addEventListener("click",function(e){

e.preventDefault();

btn.classList.add("hyper");

document.body.classList.add("hyperjump");

document
.querySelector(".sun")
.classList.add("collapse");
  
setTimeout(()=>{

window.location.href="home.html";

},1800);

});

</script>

</body>
</html>
