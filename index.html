<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAKANDA ZONE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:radial-gradient(circle at center,#081224,#02040a);
    height:100vh;
    font-family:'Orbitron',sans-serif;
}

/* Bintang */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* Konten Tengah */
.hero{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

.hero h1{
    color:white;
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:8px;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

.hero p{
    margin-top:15px;
    color:#d8d8d8;
    font-size:1.1rem;
}

.enter-btn{
    display:inline-block;
    margin-top:40px;
    padding:15px 55px;
    border:2px solid #00ffff;
    color:white;
    text-decoration:none;
    border-radius:50px;
    transition:.3s;
    box-shadow:0 0 20px #00ffff;
}

.enter-btn:hover{
    transform:scale(1.08);
    background:#00ffff;
    color:black;
}

/* Orbit */
.orbit{
    position:absolute;
    top:50%;
    left:50%;
    border:1px solid rgba(255,255,255,.08);
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.orbit1{
    width:220px;
    height:220px;
    animation:spin 10s linear infinite;
}

.orbit2{
    width:350px;
    height:350px;
    animation:spin 18s linear infinite;
}

.orbit3{
    width:520px;
    height:520px;
    animation:spin 28s linear infinite;
}

.planet{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
}

.mercury{
    width:18px;
    height:18px;
    background:#a9a9a9;
}

.earth{
    width:26px;
    height:26px;
    background:linear-gradient(#1e90ff,#32cd32);
}

.saturn{
    width:38px;
    height:38px;
    background:#d8b77a;
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
}

.saturn::before{
    content:'';
    position:absolute;
    width:65px;
    height:12px;
    border:2px solid #e6cf9d;
    border-radius:50%;
    left:-15px;
    top:12px;
}

@keyframes spin{
    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

.footer-planets{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#888;
    font-size:1.4rem;
}

</style>
</head>
<body>

<!-- Orbit Planet -->
<div class="orbit orbit1">
    <div class="planet mercury"></div>
</div>

<div class="orbit orbit2">
    <div class="planet earth"></div>
</div>

<div class="orbit orbit3">
    <div class="saturn"></div>
</div>

<!-- Judul -->
<div class="hero">
    <h1>KAKANDA ZONE</h1>

    <p>Welcome To My Universe ✨</p>

    <a href="home.html" class="enter-btn">
        ENTER
    </a>
</div>

<div class="footer-planets">
☿ ♀ 🌍 ♂ ♃ 🪐 ♅ ♆
</div>

<script>

/* Membuat Bintang */
for(let i=0;i<250;i++){

    let star=document.createElement("div");

    star.classList.add("star");

    let size=Math.random()*3+1;

    star.style.width=size+"px";
    star.style.height=size+"px";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(star);
}

</script>

</body>
</html>
